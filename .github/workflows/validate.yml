name: Validate

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout xian-wallet-mobile
        uses: actions/checkout@v6
        with:
          path: xian-wallet-mobile

      - name: Checkout xian-js
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/xian-js
          ref: main
          path: xian-js

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            xian-js/package-lock.json
            xian-wallet-mobile/package-lock.json

      - name: Install and build xian-js
        working-directory: xian-js
        run: |
          npm ci
          node <<'NODE'
          const { execFileSync } = require("node:child_process");
          const { arch, platform } = process;

          if (platform === "linux" && arch === "x64") {
            const version = require("./node_modules/rollup/package.json").version;
            execFileSync(
              "npm",
              ["install", "--no-save", `@rollup/rollup-linux-x64-gnu@${version}`],
              { stdio: "inherit" },
            );
          }
          NODE
          npm run build

      - name: Install xian-wallet-mobile
        working-directory: xian-wallet-mobile
        run: |
          npm ci
          npm audit --audit-level=critical --omit=dev

      - name: Typecheck xian-wallet-mobile
        working-directory: xian-wallet-mobile
        run: npm run typecheck

      - name: Test xian-wallet-mobile
        working-directory: xian-wallet-mobile
        run: npm test
